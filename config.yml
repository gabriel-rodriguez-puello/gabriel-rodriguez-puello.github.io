  profileMode:
    enabled: true
    title: Gabriel Rodríguez-Puello
    subtitle: |
      PhD Candidate in Economics · [Jönköping International Business School (JIBS)](https://ju.se/en/research/economics.html) · [CEnSE](https://ju.se/en/research/research-centres-and-groups/cense.html) · **On the 2026–27 job market**

      I use applied microeconomic and causal inference methods — including difference-in-differences, event studies, instrumental variables, and causal forests — to study how labor market shocks affect crime, fertility, and entrepreneurship.

      **Research fields:** Labor Economics · Crime Economics · Regional Economics · Development Economics

      ---

      **Recent**

      - *Labour Economics* — "Diffusion of Economic Shocks in the Labor Market" (Forthcoming, 2026)
      - *Journal of Happiness Studies* — "The Disruptive Long-term Costs of International Migration" (Forthcoming, 2025)
      - **2026 conferences:** EALE (Barcelona) · ESPE (Helsinki) · WCERE (Cascais) · 2nd Berlin PhD Conference · YEM (Brno) · SOFI Seminar (Stockholm) · U. Reading Workshop
